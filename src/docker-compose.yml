services:

#--------------------------------FRONTEND--------------------------------

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
    networks:
      - ft_transcendence
    depends_on:
      - backend
    restart: always

#---------------------------------SERVER---------------------------------

  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    networks:
      - ft_transcendence
    restart: always

#--------------------------------DATABASE--------------------------------



#--------------------------------VOLUMES---------------------------------



#--------------------------------NETWORKS--------------------------------

networks:
  ft_transcendence:
    name: ft_transcendence

#--------------------------------SECRETS---------------------------------