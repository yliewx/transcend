services:

#---------------------------------BACKEND--------------------------------

  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_PATH=/db/database.sqlite
    networks:
      - ft_transcendence
    volumes:
      - sqlite_data:/db
    restart: always

#--------------------------------FRONTEND--------------------------------

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
    networks:
      - ft_transcendence
    depends_on:
      - backend
    restart: always

#--------------------------------DATABASE--------------------------------



#--------------------------------VOLUMES---------------------------------

volumes:
  sqlite_data:
    driver: local

#--------------------------------NETWORKS--------------------------------

networks:
  ft_transcendence:
    name: ft_transcendence

#--------------------------------SECRETS---------------------------------